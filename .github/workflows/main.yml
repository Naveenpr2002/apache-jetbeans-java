name: Java Ant CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Ant
      run: sudo apt-get update && sudo apt-get install -y ant

    - name: Build project
      run: ant clean jar

    - name: Run tests
      run: ant test
