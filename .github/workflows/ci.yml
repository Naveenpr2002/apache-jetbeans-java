name: Java Ant CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: food_order

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Build
        run: ant clean

      - name: Run
        run: ant run

      - name: Test
        run: ant test
